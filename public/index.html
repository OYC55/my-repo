<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>재무분석기</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px;
    color: #1a1a1a;
    background: #fff;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; font-size: 14px; }
  .company-row { margin-bottom: 16px; position: relative; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #444; }
  input[type="text"], input[type="number"] {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    color: #1a1a1a;
    background: #fff;
  }
  input.selected { border-color: #4472C4; background: #eef2fb; color: #1a1a1a; }
  .suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #ccc;
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }
  .suggestions div {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
  }
  .suggestions div:hover, .suggestions div.active { background: #eef2fb; }
  .years-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .years-row div { flex: 1; }
  button#submitBtn {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: #4472C4;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  button#submitBtn:disabled { background: #aaa; cursor: not-allowed; }
  #status { margin-top: 14px; font-size: 14px; min-height: 20px; }
  #status.error { color: #c0392b; }
  #status.ok { color: #2e7d32; }
  #results { display: none; margin-top: 24px; }
  .table-scroll { overflow-x: auto; border: 1px solid #ddd; border-radius: 6px; }
  table.compare-table { border-collapse: collapse; width: 100%; font-size: 13px; }
  table.compare-table th, table.compare-table td {
    border: 1px solid #ddd;
    padding: 6px 10px;
    text-align: right;
    white-space: nowrap;
  }
  table.compare-table thead th { background: #4472C4; color: #fff; text-align: center; }
  table.compare-table td.label { text-align: left; font-weight: 600; background: #f7f7f9; }
  button#downloadBtn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #4472C4;
    background: #fff;
    border: 1px solid #4472C4;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>재무분석기</h1>
  <p class="sub">기업 3곳을 검색해 선택하고, 최근 3개년 재무제표를 엑셀로 비교하세요.</p>

  <div id="companies"></div>

  <div class="years-row" id="years"></div>

  <button id="submitBtn" disabled>비교하기</button>
  <div id="status"></div>

  <div id="results">
    <div class="table-scroll">
      <table class="compare-table" id="resultsTable"></table>
    </div>
    <button id="downloadBtn">엑셀 다운로드</button>
  </div>

<script>
const state = {
  companies: [null, null, null],
};

const currentYear = new Date().getFullYear();
const defaultYears = [currentYear - 3, currentYear - 2, currentYear - 1];

const companiesEl = document.getElementById('companies');
const yearsEl = document.getElementById('years');
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const resultsTable = document.getElementById('resultsTable');
const downloadBtn = document.getElementById('downloadBtn');
let lastXlsxBase64 = null;

function debounce(fn, delay) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}

function updateSubmitState() {
  submitBtn.disabled = state.companies.some(c => !c);
}

function buildCompanyRow(index) {
  const row = document.createElement('div');
  row.className = 'company-row';
  row.innerHTML = `
    <label>회사 ${index + 1}</label>
    <input type="text" placeholder="회사명을 입력하세요 (예: 삼성전자)" autocomplete="off">
    <div class="suggestions"></div>
  `;
  const input = row.querySelector('input');
  const suggestionsEl = row.querySelector('.suggestions');

  const search = debounce(async (query) => {
    if (!query.trim()) {
      suggestionsEl.style.display = 'none';
      return;
    }
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(query));
      const results = await res.json();
      renderSuggestions(results);
    } catch (e) {
      suggestionsEl.style.display = 'none';
    }
  }, 250);

  function renderSuggestions(results) {
    if (!results.length) {
      suggestionsEl.style.display = 'none';
      return;
    }
    suggestionsEl.innerHTML = results.map(c =>
      `<div data-corp-code="${c.corp_code}" data-corp-name="${c.corp_name}">${c.corp_name}${c.stock_code ? ' (' + c.stock_code + ')' : ''}</div>`
    ).join('');
    suggestionsEl.style.display = 'block';
  }

  input.addEventListener('input', () => {
    state.companies[index] = null;
    input.classList.remove('selected');
    updateSubmitState();
    search(input.value);
  });

  suggestionsEl.addEventListener('click', (e) => {
    const target = e.target.closest('div[data-corp-code]');
    if (!target) return;
    input.value = target.dataset.corpName;
    input.classList.add('selected');
    state.companies[index] = {
      corp_code: target.dataset.corpCode,
      corp_name: target.dataset.corpName,
    };
    suggestionsEl.style.display = 'none';
    updateSubmitState();
  });

  document.addEventListener('click', (e) => {
    if (!row.contains(e.target)) {
      suggestionsEl.style.display = 'none';
    }
  });

  return row;
}

function buildYearInput(index) {
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <label>연도 ${index + 1}</label>
    <input type="number" value="${defaultYears[index]}" min="2000" max="${currentYear}">
  `;
  return wrap;
}

for (let i = 0; i < 3; i++) {
  companiesEl.appendChild(buildCompanyRow(i));
}
for (let i = 0; i < 3; i++) {
  yearsEl.appendChild(buildYearInput(i));
}

function formatValue(value, isRatio) {
  if (value === null || value === undefined) return '-';
  return isRatio ? value.toFixed(2) + '%' : value.toLocaleString('ko-KR');
}

function renderResultsTable(payload) {
  const { companies, years, rows, ratio_rows, data } = payload;
  const ratioSet = new Set(ratio_rows);

  let html = '<thead><tr><th>항목</th>';
  companies.forEach(c => {
    html += `<th colspan="${years.length}">${c.corp_name}</th>`;
  });
  html += '</tr><tr><th></th>';
  companies.forEach(() => {
    years.forEach(y => { html += `<th>${y}년</th>`; });
  });
  html += '</tr></thead><tbody>';

  rows.forEach(row => {
    html += `<tr><td class="label">${row}</td>`;
    companies.forEach(c => {
      years.forEach(y => {
        const yearData = data[c.corp_name] && data[c.corp_name][y];
        const value = yearData ? yearData[row] : null;
        html += `<td>${formatValue(value, ratioSet.has(row))}</td>`;
      });
    });
    html += '</tr>';
  });
  html += '</tbody>';

  resultsTable.innerHTML = html;
  resultsEl.style.display = 'block';
}

function base64ToBlob(base64, mimeType) {
  const byteChars = atob(base64);
  const byteNumbers = new Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
  return new Blob([new Uint8Array(byteNumbers)], { type: mimeType });
}

downloadBtn.addEventListener('click', () => {
  if (!lastXlsxBase64) return;
  const blob = base64ToBlob(
    lastXlsxBase64,
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
  );
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '재무비교.xlsx';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

submitBtn.addEventListener('click', async () => {
  const years = Array.from(yearsEl.querySelectorAll('input')).map(i => parseInt(i.value, 10));

  statusEl.className = '';
  statusEl.textContent = '조회 중입니다... (최대 30초 소요될 수 있어요)';
  submitBtn.disabled = true;
  resultsEl.style.display = 'none';

  try {
    const res = await fetch('/api/compare', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ companies: state.companies, years }),
    });

    const payload = await res.json().catch(() => null);

    if (!res.ok || !payload) {
      throw new Error((payload && payload.error) || '요청이 실패했습니다.');
    }

    lastXlsxBase64 = payload.xlsx_base64;
    renderResultsTable(payload);

    statusEl.className = 'ok';
    statusEl.textContent = '완료! 아래에서 결과를 확인하고 엑셀로도 받을 수 있습니다.';
  } catch (e) {
    statusEl.className = 'error';
    statusEl.textContent = e.message;
  } finally {
    updateSubmitState();
  }
});
</script>
</body>
</html>
